name: 🚀 Deploy AlwaysData

on:
  push:
    branches:
      - main

jobs:

  deploy:
  
    name: 🎉 Desplegando Proyecto
    
    runs-on: ubuntu-latest

    steps:

      - name: 🚚 Clonando repositorio
        uses: actions/checkout@v4


      - name: 📂 Subiendo archivos por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5

        with:

          server: ftp-claseapi.alwaysdata.net

          username: ${{ secrets.FTP_USERNAME }}

          password: ${{ secrets.FTP_PASSWORD }}

          server-dir: www/cliente1/

          protocol: ftps

          timeout: 600000

          log-level: standard

          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            README.md
